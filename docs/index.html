<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RentDue Support</title>
  <meta name="description" content="Technical support for the RentDue iOS app.">
  <style>
    :root {
      --bg: #f7f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #9c6b1f;
      --border: #e5e7eb;
      --link: #2563eb;
      --chip: #eef2ff;
      --chip-active: #111827;
      --chip-active-text: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #faf7f2 0%, var(--bg) 45%);
      line-height: 1.6;
    }
    .container {
      width: min(920px, 92vw);
      margin: 0 auto;
      padding: 32px 0 56px;
    }
    .top-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      align-items: center;
    }
    .top-nav {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .top-nav a {
      color: var(--link);
      text-decoration: none;
      font-weight: 600;
    }
    .lang-switch {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .lang-label {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .lang-btn {
      border: 1px solid var(--border);
      background: var(--chip);
      color: var(--text);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .lang-btn.active {
      background: var(--chip-active);
      color: var(--chip-active-text);
      border-color: var(--chip-active);
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
    }
    h1, h2 { margin: 0 0 10px; line-height: 1.25; }
    h1 { font-size: clamp(1.75rem, 3.4vw, 2.35rem); }
    h2 { font-size: 1.2rem; margin-top: 22px; }
    p, li { color: var(--text); }
    .muted { color: var(--muted); }
    .badge {
      display: inline-block;
      font-size: 0.8rem;
      color: #fff;
      background: var(--accent);
      padding: 4px 10px;
      border-radius: 999px;
      margin-bottom: 10px;
    }
    ul { margin-top: 8px; padding-left: 20px; }
    .faq dt {
      margin-top: 12px;
      font-weight: 700;
    }
    .faq dd {
      margin: 4px 0 0;
      color: var(--muted);
    }
    footer {
      margin-top: 18px;
      font-size: 0.92rem;
      color: var(--muted);
    }
    a { color: var(--link); }
    @media (max-width: 720px) {
      .lang-label { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="top-row">
      <nav class="top-nav" aria-label="Legal and support links">
        <a data-nav="index.html" data-nav-key="navSupport" aria-current="page"></a>
        <a data-nav="privacy.html" data-nav-key="navPrivacy"></a>
        <a data-nav="terms.html" data-nav-key="navTerms"></a>
      </nav>
      <div class="lang-switch">
        <span class="lang-label" id="lang-label"></span>
        <button type="button" class="lang-btn" data-lang-btn="en">English</button>
        <button type="button" class="lang-btn" data-lang-btn="zh-Hans">简体中文</button>
        <button type="button" class="lang-btn" data-lang-btn="zh-Hant">繁體中文</button>
      </div>
    </div>

    <section class="card">
      <span class="badge" id="badge"></span>
      <h1 id="title"></h1>
      <p class="muted" id="subtitle"></p>
      <div id="content"></div>
      <footer id="footer"></footer>
    </section>
    <noscript>
      JavaScript is required for language switching. This page supports English, Simplified Chinese, and Traditional Chinese.
    </noscript>
  </main>

  <script>
    const CONTENT = {
      "en": {
        headTitle: "RentDue Support",
        navSupport: "Support",
        navPrivacy: "Privacy Policy",
        navTerms: "Terms of Use",
        languageLabel: "Language:",
        badge: "RentDue Support",
        title: "Technical Support",
        subtitle: "This page provides support information for the RentDue iOS app (project name: RentCollect).",
        body: `
          <h2>Contact</h2>
          <p>For help, account questions, or bug reports, contact: <a href="mailto:support@rentdue.app">support@rentdue.app</a></p>
          <p class="muted">Typical response time: 1-3 business days.</p>

          <h2>Common Help Topics</h2>
          <ul>
            <li>How to add or edit properties, units, and leases</li>
            <li>Managing receivables and marking rent as paid</li>
            <li>Scanning and attaching lease contract files</li>
            <li>Notification reminder setup and troubleshooting</li>
            <li>Privacy, local data storage, and app permissions</li>
          </ul>

          <h2>Troubleshooting</h2>
          <ul>
            <li>Update to the latest iOS version supported by the App Store release.</li>
            <li>Force close and reopen the app if a view appears stuck.</li>
            <li>Confirm Camera/Photo permissions are enabled in iOS Settings if uploads fail.</li>
            <li>Verify notifications are allowed in iOS Settings if reminders do not appear.</li>
          </ul>

          <h2>FAQ</h2>
          <dl class="faq">
            <dt>Where is my data stored?</dt>
            <dd>Core app records are stored on your device. See the Privacy Policy for details.</dd>
            <dt>Do you track me across apps or websites?</dt>
            <dd>No. RentDue does not use cross-app tracking.</dd>
            <dt>Can I delete my data?</dt>
            <dd>Yes. You can delete records in the app, or remove the app from your device.</dd>
          </dl>
        `,
        footer: "Last updated: February 24, 2026"
      },
      "zh-Hans": {
        headTitle: "RentDue 技术支持",
        navSupport: "技术支持",
        navPrivacy: "隐私政策",
        navTerms: "服务条款",
        languageLabel: "语言：",
        badge: "RentDue 支持",
        title: "技术支持",
        subtitle: "本页面提供 RentDue iOS 应用（项目名：RentCollect）的支持信息。",
        body: `
          <h2>联系方式</h2>
          <p>如需帮助、反馈问题或提交 Bug，请联系：<a href="mailto:support@rentdue.app">support@rentdue.app</a></p>
          <p class="muted">通常回复时间：1-3 个工作日。</p>

          <h2>常见支持主题</h2>
          <ul>
            <li>如何新增或编辑房产、单元和租约</li>
            <li>如何管理应收款并标记已收款</li>
            <li>如何扫描并附加合同文件</li>
            <li>提醒通知设置与故障排查</li>
            <li>隐私、设备本地存储和权限说明</li>
          </ul>

          <h2>故障排查</h2>
          <ul>
            <li>请将系统更新至 App Store 版本支持的最新 iOS 版本。</li>
            <li>界面卡住时，可先关闭应用后重新打开。</li>
            <li>上传失败时，请在 iOS 设置中确认相机/相册权限已开启。</li>
            <li>收不到提醒时，请在 iOS 设置中确认通知权限已开启。</li>
          </ul>

          <h2>常见问题</h2>
          <dl class="faq">
            <dt>我的数据存在哪里？</dt>
            <dd>核心数据保存在你的设备本地。详情见《隐私政策》。</dd>
            <dt>是否会跨 App 或网站跟踪我？</dt>
            <dd>不会。RentDue 不进行跨应用跟踪。</dd>
            <dt>我可以删除数据吗？</dt>
            <dd>可以。你可以在应用内删除记录，或直接卸载应用。</dd>
          </dl>
        `,
        footer: "最后更新：2026 年 2 月 24 日"
      },
      "zh-Hant": {
        headTitle: "RentDue 技術支援",
        navSupport: "技術支援",
        navPrivacy: "隱私政策",
        navTerms: "服務條款",
        languageLabel: "語言：",
        badge: "RentDue 支援",
        title: "技術支援",
        subtitle: "本頁面提供 RentDue iOS 應用（專案名稱：RentCollect）的支援資訊。",
        body: `
          <h2>聯絡方式</h2>
          <p>如需協助、回報問題或提交 Bug，請聯絡：<a href="mailto:support@rentdue.app">support@rentdue.app</a></p>
          <p class="muted">一般回覆時間：1-3 個工作天。</p>

          <h2>常見支援主題</h2>
          <ul>
            <li>如何新增或編輯房產、單元與租約</li>
            <li>如何管理應收款並標記為已收款</li>
            <li>如何掃描並附加租賃合約檔案</li>
            <li>提醒通知設定與問題排除</li>
            <li>隱私、裝置本地儲存與權限說明</li>
          </ul>

          <h2>問題排除</h2>
          <ul>
            <li>請更新到 App Store 版本支援的最新 iOS 版本。</li>
            <li>若畫面卡住，請先強制關閉 App 後再開啟。</li>
            <li>若上傳失敗，請到 iOS 設定確認相機/照片權限已開啟。</li>
            <li>若未收到提醒，請到 iOS 設定確認通知權限已開啟。</li>
          </ul>

          <h2>常見問題</h2>
          <dl class="faq">
            <dt>我的資料儲存在哪裡？</dt>
            <dd>核心資料儲存在你的裝置本地。詳情請見《隱私政策》。</dd>
            <dt>是否會跨 App 或網站追蹤我？</dt>
            <dd>不會。RentDue 不進行跨應用追蹤。</dd>
            <dt>我可以刪除資料嗎？</dt>
            <dd>可以。你可在 App 內刪除紀錄，或直接移除 App。</dd>
          </dl>
        `,
        footer: "最後更新：2026 年 2 月 24 日"
      }
    };

    const STORAGE_KEY = "rentdue-site-lang";
    const SUPPORTED_LANGS = ["en", "zh-Hans", "zh-Hant"];

    function normalizeLang(value) {
      if (!value) return null;
      const v = value.toLowerCase();
      if (v === "en" || v.startsWith("en-")) return "en";
      if (v === "zh-hans" || v === "zh-cn" || v.startsWith("zh-cn") || v.includes("hans")) return "zh-Hans";
      if (v === "zh-hant" || v === "zh-tw" || v === "zh-hk" || v.startsWith("zh-tw") || v.startsWith("zh-hk") || v.includes("hant")) return "zh-Hant";
      return null;
    }

    function readStoredLang() {
      try {
        return normalizeLang(localStorage.getItem(STORAGE_KEY));
      } catch (error) {
        return null;
      }
    }

    function writeStoredLang(lang) {
      try {
        localStorage.setItem(STORAGE_KEY, lang);
      } catch (error) {
      }
    }

    function detectLanguage() {
      const queryLang = normalizeLang(new URLSearchParams(window.location.search).get("lang"));
      if (queryLang) return queryLang;
      const savedLang = readStoredLang();
      if (savedLang) return savedLang;
      const browserLang = normalizeLang(navigator.language || "");
      if (browserLang) return browserLang;
      return "en";
    }

    function updateNavigationLinks(lang) {
      document.querySelectorAll("[data-nav]").forEach((node) => {
        node.href = node.dataset.nav + "?lang=" + encodeURIComponent(lang);
      });
    }

    function updateLanguageButtons(lang) {
      document.querySelectorAll("[data-lang-btn]").forEach((node) => {
        node.classList.toggle("active", node.dataset.langBtn === lang);
      });
    }

    function render(lang, shouldUpdateUrl) {
      const resolvedLang = SUPPORTED_LANGS.includes(lang) ? lang : "en";
      const copy = CONTENT[resolvedLang];
      document.title = copy.headTitle;
      document.documentElement.lang = resolvedLang;

      document.getElementById("lang-label").textContent = copy.languageLabel;
      document.getElementById("badge").textContent = copy.badge;
      document.getElementById("title").textContent = copy.title;
      document.getElementById("subtitle").textContent = copy.subtitle;
      document.getElementById("content").innerHTML = copy.body;
      document.getElementById("footer").textContent = copy.footer;

      document.querySelectorAll("[data-nav-key]").forEach((node) => {
        node.textContent = copy[node.dataset.navKey];
      });

      updateNavigationLinks(resolvedLang);
      updateLanguageButtons(resolvedLang);
      writeStoredLang(resolvedLang);

      if (shouldUpdateUrl) {
        const url = new URL(window.location.href);
        url.searchParams.set("lang", resolvedLang);
        window.history.replaceState({}, "", url);
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      const initialLang = detectLanguage();
      render(initialLang, true);

      document.querySelectorAll("[data-lang-btn]").forEach((node) => {
        node.addEventListener("click", () => {
          render(node.dataset.langBtn, true);
        });
      });
    });
  </script>
</body>
</html>
