<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RentDue Terms of Use</title>
  <meta name="description" content="Terms of Use for the RentDue iOS app.">
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --link: #2563eb;
      --chip: #eef2ff;
      --chip-active: #111827;
      --chip-active-text: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.65;
    }
    .container {
      width: min(920px, 92vw);
      margin: 0 auto;
      padding: 32px 0 56px;
    }
    .top-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      align-items: center;
    }
    .top-nav {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .top-nav a {
      color: var(--link);
      text-decoration: none;
      font-weight: 600;
    }
    .lang-switch {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .lang-label {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .lang-btn {
      border: 1px solid var(--border);
      background: var(--chip);
      color: var(--text);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.82rem;
      cursor: pointer;
    }
    .lang-btn.active {
      background: var(--chip-active);
      color: var(--chip-active-text);
      border-color: var(--chip-active);
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
    }
    h1 { margin: 0 0 12px; font-size: clamp(1.65rem, 3vw, 2.1rem); }
    h2 { margin: 20px 0 8px; font-size: 1.1rem; }
    p, li { margin: 0 0 10px; }
    ul { padding-left: 20px; margin: 0 0 8px; }
    .muted { color: var(--muted); }
    footer {
      margin-top: 20px;
      color: var(--muted);
      font-size: 0.92rem;
    }
    a { color: var(--link); }
    @media (max-width: 720px) {
      .lang-label { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="top-row">
      <nav class="top-nav" aria-label="Legal and support links">
        <a data-nav="index.html" data-nav-key="navSupport"></a>
        <a data-nav="privacy.html" data-nav-key="navPrivacy"></a>
        <a data-nav="terms.html" data-nav-key="navTerms" aria-current="page"></a>
      </nav>
      <div class="lang-switch">
        <span class="lang-label" id="lang-label"></span>
        <button type="button" class="lang-btn" data-lang-btn="en">English</button>
        <button type="button" class="lang-btn" data-lang-btn="zh-Hans">简体中文</button>
        <button type="button" class="lang-btn" data-lang-btn="zh-Hant">繁體中文</button>
      </div>
    </div>

    <section class="card">
      <h1 id="title"></h1>
      <p class="muted" id="effective-date"></p>
      <div id="content"></div>
      <footer id="footer"></footer>
    </section>
    <noscript>
      JavaScript is required for language switching. This page supports English, Simplified Chinese, and Traditional Chinese.
    </noscript>
  </main>

        footer: "RentDue / RentCollect by NewTree"

      "zh-Hans": {

        navPrivacy: "隐私政策",
        navTerms: "服务条款",
        languageLabel: "语言：",

        body: `

          <p>下载、安装或使用 RentDue（以下简称“本应用”）即表示你同意本条款。若你不同意，请停止使用本应用。</p>

      "zh-Hant": {

        navPrivacy: "隱私政策",
        navTerms: "服務條款",

        effectiveDate: "生效日期：2026 年 2 月 24 日",
        body: `
          <h2>1. 條款同意</h2>
          <p>下載、安裝或使用 RentDue（以下簡稱「本 App」）即表示你同意本條款。若你不同意，請停止使用本 App。</p>

          <h2>2. App 用途</h2>
          <p>RentDue 用於協助房東與物業管理者管理房產紀錄、租約、應收款與相關合約文件。</p>

          <p>在法律允許的最大範圍內，本 App 依「現況」與「可用」提供，不提供任何明示或默示保證。</p>

          <p>在法律允許的最大範圍內，我們不對因使用本 App 產生的任何間接、附帶、特殊、衍生或懲罰性損害負責，包括利潤、資料或商譽損失。</p>

          <h2>9. 變更</h2>
          <p>我們可能不定期更新本 App 或本條款。更新後持續使用本 App 即表示你接受修訂內容。</p>

          <p>如對本條款有疑問，請寄信至：<a href="mailto:support@rentdue.app">support@rentdue.app</a></p>

        footer: "RentDue / RentCollect by NewTree"
      }
    };

    const STORAGE_KEY = "rentdue-site-lang";
    const SUPPORTED_LANGS = ["en", "zh-Hans", "zh-Hant"];

    function normalizeLang(value) {
      if (!value) return null;
      const v = value.toLowerCase();
      if (v === "en" || v.startsWith("en-")) return "en";
      if (v === "zh-hans" || v === "zh-cn" || v.startsWith("zh-cn") || v.includes("hans")) return "zh-Hans";
      if (v === "zh-hant" || v === "zh-tw" || v === "zh-hk" || v.startsWith("zh-tw") || v.startsWith("zh-hk") || v.includes("hant")) return "zh-Hant";
      return null;
    }

    function readStoredLang() {
      try {
        return normalizeLang(localStorage.getItem(STORAGE_KEY));
      } catch (error) {
        return null;
      }
    }

    function writeStoredLang(lang) {
      try {
        localStorage.setItem(STORAGE_KEY, lang);
      } catch (error) {
      }
    }

    function detectLanguage() {
      const queryLang = normalizeLang(new URLSearchParams(window.location.search).get("lang"));
      if (queryLang) return queryLang;
      const savedLang = readStoredLang();
      if (savedLang) return savedLang;
      const browserLang = normalizeLang(navigator.language || "");
      if (browserLang) return browserLang;
      return "en";
    }

    function updateNavigationLinks(lang) {
      document.querySelectorAll("[data-nav]").forEach((node) => {
        node.href = node.dataset.nav + "?lang=" + encodeURIComponent(lang);
      });
    }

    function updateLanguageButtons(lang) {
      document.querySelectorAll("[data-lang-btn]").forEach((node) => {
        node.classList.toggle("active", node.dataset.langBtn === lang);
      });
    }

    function render(lang, shouldUpdateUrl) {
      const resolvedLang = SUPPORTED_LANGS.includes(lang) ? lang : "en";
      const copy = CONTENT[resolvedLang];
      document.title = copy.headTitle;
      document.documentElement.lang = resolvedLang;

      document.getElementById("lang-label").textContent = copy.languageLabel;
      document.getElementById("title").textContent = copy.title;
      document.getElementById("effective-date").textContent = copy.effectiveDate;
      document.getElementById("content").innerHTML = copy.body;
      document.getElementById("footer").textContent = copy.footer;

      document.querySelectorAll("[data-nav-key]").forEach((node) => {
        node.textContent = copy[node.dataset.navKey];
      });

      updateNavigationLinks(resolvedLang);
      updateLanguageButtons(resolvedLang);
      writeStoredLang(resolvedLang);

      if (shouldUpdateUrl) {
        const url = new URL(window.location.href);
        url.searchParams.set("lang", resolvedLang);
        window.history.replaceState({}, "", url);
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      const initialLang = detectLanguage();
      render(initialLang, true);

      document.querySelectorAll("[data-lang-btn]").forEach((node) => {
        node.addEventListener("click", () => {
          render(node.dataset.langBtn, true);
        });
      });
    });

</html>
